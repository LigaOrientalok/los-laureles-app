<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga Oriental - Autenticación</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Oswald:wght@400;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="intro-overlay">
        <video autoplay muted loop playsinline id="intro-video">
            <source src="assets/video/limol copa.mp4" type="video/mp4">
        </video>
        <img src="assets/img/liga.jpg" alt="Liga Oriental" class="intro-logo">
        <button class="intro-skip" id="intro-skip">Saltar ▶</button>
    </div>
    <div id="app">
        <div style="min-height:100vh; background:#0b0e14; display:flex; justify-content:center; align-items:center;">
            <div style="text-align:center; color:white;">
                <h1 style="color:#eab308; font-size:2rem; margin-bottom:20px;">⚡ Autenticando...</h1>
                <p>Por favor espera mientras completamos tu acceso.</p>
            </div>
        </div>
    </div>
    
    <script src="js/supabase-config.js"></script>
    <script src="js/tournaments.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/export.js"></script>
    <script src="js/script-v2.js"></script>
    <script src="js/auth-google.js"></script>
    <script src="js/admin-users.js"></script>

    <script>
        function initAuth() {
            const overlay = document.getElementById('intro-overlay');
            if (!overlay || window.location.hash || sessionStorage.getItem('introSeen')) {
                overlay?.remove();
                inicializarAuth();
            } else {
                document.getElementById('intro-skip').addEventListener('click', () => {
                    overlay.classList.add('fade-out');
                    sessionStorage.setItem('introSeen', '1');
                    setTimeout(() => { overlay.remove(); inicializarAuth(); }, 800);
                });
                document.getElementById('intro-video').addEventListener('ended', () => {
                    document.getElementById('intro-skip')?.click();
                });
            }
        }
        document.addEventListener('DOMContentLoaded', initAuth);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga Oriental - Admin</title>

    <!-- Librerías -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Oswald:wght@400;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="loading-screen" style="min-height:100vh; display:flex; justify-content:center; align-items:center; background:#0b0e14; color:#eab308; font-family:sans-serif; font-size:1.2rem;">
        <div style="text-align:center;">
            <div style="font-size:3rem; margin-bottom:20px;">⚡</div>
            <div>Cargando Liga Oriental...</div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/supabase-config.js"></script>
    <script src="js/tournaments.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/export.js"></script>
    <script src="js/script-v2.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // ✅ Carga principal con manejo de errores
        async function cargarApp() {
            try {
                const { data: { session } } = await _supabase.auth.getSession();

                if (!session) {
                    inicializarAuth();
                } else {
                    mostrarApp();
                }
            } catch (e) {
                console.error('Error al cargar app:', e);
                document.getElementById('loading-screen').innerHTML = `
                    <div style="text-align:center; padding:20px;">
                        <div style="font-size:3rem; margin-bottom:20px;">⚠️</div>
                        <h2 style="color:#ef4444; margin-bottom:10px;">Error de conexión</h2>
                        <p style="color:#b0bcc4; max-width:400px; line-height:1.5;">
                            No se pudo conectar con Supabase. Verificá que la URL y la key sean correctas.
                        </p>
                        <p style="color:#8b949e; font-size:0.85rem; margin-top:20px;">${e.message}</p>
                        <button onclick="location.reload()" style="margin-top:20px; padding:12px 30px; background:#3b82f6; color:white; border:none; border-radius:6px; cursor:pointer; font-size:1rem;">Reintentar</button>
                    </div>
                `;
            }
        }

        function mostrarApp() {
            document.getElementById('loading-screen')?.remove();
            document.body.innerHTML = `
                <header>
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:0 20px;">
                        <h1>LIGA <span class="accent-text">ORIENTAL</span></h1>
                        <button onclick="logoutUsuario()" style="background:#ef4444; color:white; padding:10px 20px; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">
                            🚪 Cerrar Sesión
                        </button>
                    </div>

                    <div style="display:flex; gap:10px; justify-content:center; margin:10px 0; flex-wrap:wrap;">
                        <select id="select-torneo" style="padding:8px; border-radius:6px; background:#0d1117; color:white; border:1px solid #30363d; flex:1; min-width:200px;"></select>
                        <button onclick="crearNuevoTorneo()" class="btn-mini" style="background:#3b82f6; color:white;">+ Nuevo Torneo</button>
                        <button onclick="respaldarDatos()" class="btn-mini" style="background:#22c55e; color:white;">💾 Respaldo</button>
                    </div>

                    <nav class="nav-main">
                        <button class="nav-btn active" onclick="showSec('inicio', this)">REGISTRO</button>
                        <button class="nav-btn" onclick="showSec('tablas', this)">TABLAS</button>
                        <button class="nav-btn" onclick="showSec('fixture', this)">📅 FIXTURE</button>
                        <button class="nav-btn" onclick="showSec('stats', this)">📊 STATS</button>
                        <button class="nav-btn" onclick="showSec('fama', this)">🏆 FAMA</button>

                        <!-- ✅ ADMIN PROTEGIDO -->
                        <button class="nav-btn admin-btn" onclick="accesoAdmin(this)">⚙️ ADMIN</button>
                    </nav>
                </header>

                <main>

                    <!-- ✅ REGISTRO ORIGINAL -->
                    <section id="sec-inicio" class="section active">
                        <div class="registro-container">
                            <div class="box">
                                <h2>Registro de Jugador</h2>

                                <label class="label-accent">CI del Jugador:</label>
                                <input type="number" id="regCI" oninput="updatePreview()">

                                <label class="label-accent">Nombre:</label>
                                <input type="text" id="regNom" oninput="updatePreview()">

                                <select id="regPos">
                                    <option value="POR">Portero</option>
                                    <option value="DFC">Defensa</option>
                                    <option value="MC">Mediocampista</option>
                                    <option value="DEL">Delantero</option>
                                </select>

                                <select id="regPierna">
                                    <option value="R">Diestro</option>
                                    <option value="L">Zurdo</option>
                                </select>

                                <select id="regEqSelect"></select>

                                <input type="file" id="regFoto" onchange="previewImage(this)">

                                <button onclick="savePlayer()">GUARDAR</button>
                            </div>
                        </div>
                    </section>

                    <!-- ✅ TABLA -->
                    <section id="sec-tablas" class="section">
                        <div class="box">
                            <select id="selectDiaTablas" onchange="renderTablaActual()">
                                <option disabled selected>Elegir Día</option>
                                <option>Lunes</option>
                                <option>Miercoles</option>
                                <option>Jueves</option>
                                <option>Viernes</option>
                                <option>Sabado</option>
                                <option>Domingo</option>
                            </select>
                        </div>

                        <div id="tabla-oriental" class="box">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Pos</th>
                                        <th>Equipo</th>
                                        <th>PJ</th>
                                        <th>PTS</th>
                                    </tr>
                                </thead>
                                <tbody id="bodyPos"></tbody>
                            </table>
                        </div>
                    </section>

                    <!-- ✅ ADMIN -->
                    <section id="sec-admin" class="section">
                        <div class="box">
                            <h3>Panel ADMIN 🔐</h3>
                            <p>Solo usuarios logueados</p>
                        </div>
                    </section>

                </main>
            `;

            setTimeout(async () => {
                await inicializarTorneos();
                await updateSelects();
            }, 100);
        }

        // ✅ INIT
        document.addEventListener('DOMContentLoaded', cargarApp);
    </script>

</body>
</html>

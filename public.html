<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga Oriental - Estadísticas En Vivo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Oswald:wght@400;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>LIGA <span class="accent-text">ORIENTAL</span></h1>
        <p style="text-align:center; color:#888; margin:5px 0; font-size:0.9rem;">📊 Estadísticas En Vivo | Datos Públicos</p>
        <nav class="nav-main">
            <button class="nav-btn active" onclick="showSec('tablas', this)">🏆 TABLAS</button>
            <button class="nav-btn" onclick="showSec('fixture', this)">📅 FIXTURE</button>
            <button class="nav-btn" onclick="showSec('stats', this)">📊 STATS</button>
            <button class="nav-btn" onclick="showSec('fama', this)">⭐ TOP JUGADORES</button>
        </nav>
    </header>

    <main>
        <!-- TABLAS -->
        <section id="sec-tablas" class="section active">
            <div class="box">
                <h2>📋 Tablas de Posiciones</h2>
                <select id="selectDiaTablas" onchange="renderTablaPublica(this.value)">
                    <option disabled selected>Elegir Día</option>
                    <option>Lunes</option><option value="Miercoles">Miércoles</option><option>Jueves</option>
                    <option>Viernes</option><option value="Sabado">Sábado</option><option>Domingo</option>
                </select>
            </div>
            <div class="box" style="overflow-x:auto">
                <table>
                    <thead><tr><th>Pos</th><th>Equipo</th><th>PJ</th><th>V</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>DF</th><th>PTS</th></tr></thead>
                    <tbody id="bodyPosPublico"></tbody>
                </table>
            </div>
        </section>

        <!-- FIXTURE -->
        <section id="sec-fixture" class="section">
            <div class="box">
                <h2>📅 Próximos Partidos</h2>
                <div id="cont-fixture-publico" style="display:grid; gap:15px;"></div>
            </div>
        </section>

        <!-- ESTADÍSTICAS -->
        <section id="sec-stats" class="section">
            <div class="box">
                <h2>📊 Estadísticas Generales</h2>
                <select id="selectDiaStatsPublico" onchange="renderEstadisticasPublicas(this.value)">
                    <option value="">Ver Todos los Días</option>
                    <option>Lunes</option><option value="Miercoles">Miércoles</option><option>Jueves</option>
                    <option>Viernes</option><option value="Sabado">Sábado</option><option>Domingo</option>
                </select>
            </div>
            
            <div class="box"><canvas id="chart-goleadores-publico" height="60"></canvas></div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; max-width:1100px; margin:0 auto; width:95%;">
                <div class="box"><canvas id="chart-equipos-publico" height="80"></canvas></div>
                <div class="box"><canvas id="chart-evolucion-publico" height="80"></canvas></div>
            </div>

            <div class="box">
                <h4>📈 Ranking Detallado</h4>
                <div id="tabla-stats-publico"></div>
            </div>
        </section>

        <!-- FAMA -->
        <section id="sec-fama" class="section">
            <div class="box">
                <h2>⭐ Hall de la Fama</h2>
                <div id="renderFamaPublico" class="fama-grid"></div>
            </div>
        </section>
    </main>

    <footer style="text-align:center; padding:20px; color:#888; margin-top:40px; border-top:1px solid #30363d;">
        <p>Liga Oriental 2026 © | Datos actualizados en tiempo real</p>
    </footer>

    <script src="js/supabase-config.js"></script>
    <script>
        let chartGoleadoresPublico = null;
        let chartEquiposPublico = null;
        let chartEvolucionPublico = null;
        let torneoPublico = null;

        // Funciones para página pública
        async function inicializarPublico() {
            const torneos = await db.getTorneos();
            if (torneos.length > 0) {
                torneoPublico = torneos[0].id;
                await renderTablaPublica('Lunes');
                await renderFixturePublico();
                await renderEstadisticasPublicas('');
                await renderFamaPublico();
            }
        }

        async function renderTablaPublica(dia) {
            if (!torneoPublico) return;
            
            const equipos = await db.getEquipos(torneoPublico);
            const filtrados = equipos
                .filter(e => e.dia_semana === dia)
                .sort((a, b) => b.pts - a.pts || (b.gf - b.gc) - (a.gf - a.gc));

            const tbody = document.getElementById('bodyPosPublico');
            tbody.innerHTML = filtrados.map((e, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td style="text-align:left"><img src="${e.logo}" style="width:28px; height:28px; border-radius:50%; margin-right:8px;"/>${escapeHtml(e.nombre)}</td>
                    <td>${e.pj}</td>
                    <td>${e.v}</td>
                    <td>${e.e}</td>
                    <td>${e.p}</td>
                    <td>${e.gf}</td>
                    <td>${e.gc}</td>
                    <td>${e.gf - e.gc}</td>
                    <td><b style="color:#eab308;">${e.pts}</b></td>
                </tr>
            `).join('');
        }

        async function renderFixturePublico() {
            if (!torneoPublico) return;
            
            const [fixture, equipos] = await Promise.all([
                db.getFixture(torneoPublico),
                db.getEquipos(torneoPublico)
            ]);
            const cont = document.getElementById('cont-fixture-publico');
            
            const getEqName = (id) => {
                const eq = equipos.find(e => e.id === id);
                return eq ? escapeHtml(eq.nombre) : `Equipo ${id}`;
            };

            const grupos = fixture.reduce((acc, m) => {
                const k = `${m.dia_semana}`;
                if (!acc[k]) acc[k] = [];
                acc[k].push(m);
                return acc;
            }, {});

            cont.innerHTML = Object.keys(grupos).map(dia => `
                <div>
                    <h3 style="color:#eab308; margin-bottom:10px;">${dia}</h3>
                    ${grupos[dia].map(m => `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:15px; background:#0d1117; border-radius:8px; margin-bottom:10px; border-left:4px solid #eab308;">
                            <span style="font-weight:bold;">${m.hora}</span>
                            <div style="flex:1; text-align:right;">${getEqName(m.equipo_local_id)}</div>
                            <div style="margin:0 15px; font-weight:bold; color:#eab308;">VS</div>
                            <div style="flex:1;">${getEqName(m.equipo_visitante_id)}</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        async function renderEstadisticasPublicas(dia) {
            if (!torneoPublico) return;
            
            const jugadores = await db.getJugadores(torneoPublico);
            const equipos = await db.getEquipos(torneoPublico);
            
            const jugsDia = dia ? jugadores.filter(j => {
                const eqs = equipos.filter(e => e.dia_semana === dia).map(e => e.id);
                return j.equipos?.some(eId => eqs.includes(eId));
            }) : jugadores;

            const equiposDia = dia ? equipos.filter(e => e.dia_semana === dia) : equipos;
            
            // Gráficos
            const goleadores = [...jugsDia].sort((a, b) => b.goles - a.goles).slice(0, 10);
            renderGraficoGoleadoresPublico(goleadores);
            renderGraficoEquiposPublico(equiposDia);
            renderGraficoEvolucionPublico(equiposDia);
            
            // Tabla
            const cont = document.getElementById('tabla-stats-publico');
            cont.innerHTML = `
                <table style="width:100%; border-collapse:collapse;">
                    <thead>
                        <tr style="background:#30363d;">
                            <th style="padding:10px; text-align:left; color:#eab308;">Jugador</th>
                            <th style="padding:10px; text-align:center; color:#eab308;">⚽ Goles</th>
                            <th style="padding:10px; text-align:center; color:#eab308;">🏃 PJ</th>
                            <th style="padding:10px; text-align:center; color:#eab308;">⭐ MVP</th>
                            <th style="padding:10px; text-align:center; color:#eab308;">Rating</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${goleadores.map((j, i) => `
                            <tr style="border-bottom:1px solid #30363d; ${i % 2 ? 'background:rgba(0,0,0,0.2);' : ''}">
                                <td style="padding:10px;">${escapeHtml(j.nombre)}</td>
                                <td style="padding:10px; text-align:center;">${j.goles}</td>
                                <td style="padding:10px; text-align:center;">${j.pj}</td>
                                <td style="padding:10px; text-align:center;">${j.mvps || 0}</td>
                                <td style="padding:10px; text-align:center; font-weight:bold; color:#eab308;">${calcularRatingPublico(j)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function renderFamaPublico() {
            if (!torneoPublico) return;
            
            const jugadores = await db.getJugadores(torneoPublico);
            const cracks = [...jugadores].sort((a, b) => b.mvps - a.mvps || b.goles - a.goles).slice(0, 12);
            
            document.getElementById('renderFamaPublico').innerHTML = cracks.map(j => `
                <div class="ficha-ea">
                    <div class="card-badge">
                        <div class="rating">${calcularRatingPublico(j)}</div>
                        <div class="pos">${j.posicion}</div>
                    </div>
                    <img src="${j.foto}" class="perfil-ea">
                    <div class="info-jugador-ea">
                        <h3>${escapeHtml(j.nombre)}</h3>
                        <div class="stats-ea">
                            <span>⚽ ${j.goles}</span>
                            <span>⭐ ${j.mvps}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function calcularRatingPublico(j) {
            let media = 60 + (j.goles * 0.5) + (j.pj * 0.2) + ((j.mvps || 0) * 2.0);
            media -= ((j.amarillas || 0) * 0.5) + ((j.rojas || 0) * 2.0);
            return Math.min(99, Math.max(10, Math.round(media)));
        }

        function renderGraficoGoleadoresPublico(goleadores) {
            const ctx = document.getElementById('chart-goleadores-publico');
            if (!ctx || !goleadores.length) return;

            if (chartGoleadoresPublico) chartGoleadoresPublico.destroy();
            chartGoleadoresPublico = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: goleadores.map(j => j.nombre),
                    datasets: [{
                        label: 'Goles',
                        data: goleadores.map(j => j.goles),
                        backgroundColor: '#eab308',
                        borderColor: '#b8860b',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#ffffff' } } },
                    scales: {
                        y: { ticks: { color: '#ffffff' }, grid: { color: '#30363d' } },
                        x: { ticks: { color: '#ffffff' }, grid: { color: '#30363d' } }
                    }
                }
            });
        }

        function renderGraficoEquiposPublico(equipos) {
            const ctx = document.getElementById('chart-equipos-publico');
            if (!ctx || !equipos.length) return;

            if (chartEquiposPublico) chartEquiposPublico.destroy();
            const equiposOrdenados = [...equipos].sort((a, b) => b.pts - a.pts);
            
            chartEquiposPublico = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: equiposOrdenados.map(e => e.nombre),
                    datasets: [{
                        data: equiposOrdenados.map(e => e.pts),
                        backgroundColor: ['#eab308', '#3b82f6', '#22c55e', '#ef4444', '#a855f7', '#f97316', '#06b6d4', '#ec4899'],
                        borderColor: '#161b22',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#ffffff' } } }
                }
            });
        }

        function renderGraficoEvolucionPublico(equipos) {
            const ctx = document.getElementById('chart-evolucion-publico');
            if (!ctx || !equipos.length) return;

            if (chartEvolucionPublico) chartEvolucionPublico.destroy();
            chartEvolucionPublico = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: equipos.map(e => e.nombre),
                    datasets: [{
                        label: 'Puntos',
                        data: equipos.map(e => e.pts),
                        borderColor: '#eab308',
                        backgroundColor: 'rgba(234, 179, 8, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4
                    }, {
                        label: 'Goles a Favor',
                        data: equipos.map(e => e.gf),
                        borderColor: '#22c55e',
                        backgroundColor: 'rgba(34, 197, 94, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#ffffff' } } },
                    scales: {
                        y: { ticks: { color: '#ffffff' }, grid: { color: '#30363d' } },
                        x: { ticks: { color: '#ffffff' }, grid: { color: '#30363d' } }
                    }
                }
            });
        }

        function showSec(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('sec-' + id);
            if(target) target.classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', inicializarPublico);
        
        // Actualizar datos cada 30 segundos
        setInterval(() => {
            if (torneoPublico) {
                renderTablaPublica(document.getElementById('selectDiaTablas').value || 'Lunes');
                renderFixturePublico();
            }
        }, 30000);
    </script>
</body>
</html>
